# ─── Build ────────────────────────────────────────────────────────────────────
[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# ─── Dev server (netlify dev) ─────────────────────────────────────────────────
[dev]
  command   = "npm run dev"
  port      = 5173
  publish   = "dist"

# ─── SPA fallback (client-side routing) ──────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Security headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# Long-cache for hashed static assets produced by Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Branch / Deploy Preview contexts ────────────────────────────────────────
# Any non-main branch becomes a Deploy Preview (auto-named by Netlify).
# "staging" branch publishes to the staging alias so you can share a stable URL.

[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context."branch-deploy"]
  command = "npm run build"
